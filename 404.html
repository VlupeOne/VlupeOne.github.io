<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0b0618">
  <meta name="robots" content="noindex, nofollow">
  <title>Página não encontrada | Thiago Pimentel</title>
  <style>
    :root {
      --ink: #0b0618;
      --blue: #315bff;
      --red: #ff405c;
      --blue-light: #7da2ff;
      --red-soft: #ff8090;
      --text: #f8f5f2;
      --muted: #b8b0c5;
      --line-dark: rgba(255,255,255,0.12);
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      display: grid;
      min-height: 100svh;
      place-items: center;
      padding: 24px;
      background: var(--ink);
      color: var(--text);
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      text-align: center;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(circle at 20% 30%, rgba(49,91,255,0.13), transparent 28rem),
        radial-gradient(circle at 80% 70%, rgba(255,64,92,0.10), transparent 26rem);
    }

    .code {
      display: block;
      font-family: Consolas, monospace;
      font-size: clamp(5rem, 20vw, 10rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.05em;
      color: transparent;
      background: linear-gradient(110deg, var(--blue-light), var(--red-soft));
      background-clip: text;
      -webkit-background-clip: text;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.4rem, 4vw, 2rem);
      letter-spacing: -0.04em;
      line-height: 1.2;
    }

    p {
      margin: 0 0 32px;
      color: var(--muted);
      font-size: 1rem;
      max-width: 420px;
    }

    .home-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 24px;
      min-height: 50px;
      color: white;
      background: linear-gradient(110deg, var(--blue), var(--red));
      border-radius: 999px;
      font-weight: 750;
      font-size: 0.9rem;
      text-decoration: none;
      transition: transform 150ms, box-shadow 150ms;
      box-shadow: 0 12px 30px rgba(49,91,255,0.22);
    }

    .home-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 40px rgba(49,91,255,0.32);
    }

    .home-link:focus-visible {
      outline: 2px solid var(--blue-light);
      outline-offset: 4px;
    }
  </style>
</head>
<body>
  <main>
    <span class="code" aria-hidden="true">404</span>
    <h1>Página não encontrada</h1>
    <p>O endereço que você tentou acessar não existe ou foi movido. Volte para o portfólio.</p>
    <a href="/" class="home-link">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Voltar ao início
    </a>
  </main>
</body>
</html>
